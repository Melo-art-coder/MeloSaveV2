<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | MeloSave</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="notification"></div>

<header class="dashboard-header">

<h2>MeloSave 💜</h2>

<div class="header-right">

<button id="themeToggle">🌙</button>

<a href="dashboard.html" class="profile-btn">Dashboard</a>

<button id="logoutBtn" class="logout-btn">Logout</button>

</div>

</header>

<section class="profile-page">

<div class="profile-card">

<div id="avatar" class="avatar">
M
</div>

<h2 id="profileName">
Your Name
</h2>

<p id="profileEmail">
example@email.com
</p>

<div class="profile-stats">

<div>

<h3>Balance</h3>

<p id="profileBalance">₦0.00</p>

</div>

<div>

<h3>Income</h3>

<p id="profileIncome">₦0.00</p>

</div>

<div>

<h3>Expenses</h3>

<p id="profileExpenses">₦0.00</p>

</div>

<div>

<h3>Savings</h3>

<p id="profileSavings">₦0.00</p>

</div>

</div>

<button id="editProfileBtn" class="primary-btn">

Edit Profile

</button>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
